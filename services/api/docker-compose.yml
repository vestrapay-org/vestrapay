name: vestrapay

services:
    apis:
        build:
            context: .
        hostname: apis
        ports:
            - 3000:3000
        volumes:
            - ./src/:/app/src/
            - ./prisma/:/app/prisma/
            - .env/:/app/.env
        restart: on-failure
        networks:
            - app-network
        depends_on:
            redis:
                condition: service_healthy
            postgres:
                condition: service_healthy
            jwks-server:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--no-verbose",
                    "--tries=1",
                    "--spider",
                    "http://localhost:3000/docs",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        profiles: ["apis"]
        deploy:
            resources:
                limits:
                    cpus: "1"
                    memory: 2G

    jwks-server:
        image: nginx:alpine
        hostname: jwks-server
        ports:
            - "3011:80"
        volumes:
            - ./keys/access-jwks.json:/usr/share/nginx/html/.well-known/access-jwks.json
            - ./keys/refresh-jwks.json:/usr/share/nginx/html/.well-known/refresh-jwks.json
            - ./ci/jwks-server/jwks.conf:/etc/nginx/conf.d/default.conf
        networks:
            - app-network
        deploy:
            resources:
                limits:
                    cpus: "0.3"
                    memory: 128M
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--no-verbose",
                    "--tries=1",
                    "--spider",
                    "http://localhost:80/.well-known/access-jwks.json",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s

    redis:
        image: redis:latest
        hostname: redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - app-network
        deploy:
            resources:
                limits:
                    cpus: "0.5"
                    memory: 256M
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 30s
            retries: 5

    # Bull dashboard for queue monitoring
    redis-bullboard:
        image: venatum/bull-board:latest
        hostname: redis-bullboard
        ports:
            - 3010:3000
        networks:
            - app-network
        environment:
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - BULL_PREFIX=Queue
            - USER_LOGIN=admin
            - USER_PASSWORD=admin123
            - REDIS_DB=1
        depends_on:
            redis:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    cpus: "0.3"
                    memory: 128M

    postgres:
        image: postgres:16-alpine
        hostname: postgres
        ports:
            - "5434:5432"
        environment:
            POSTGRES_USER: vestrapay
            POSTGRES_PASSWORD: vestrapay
            POSTGRES_DB: vestrapay
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - app-network
        deploy:
            resources:
                limits:
                    cpus: "1"
                    memory: 1GB
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U vestrapay"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

volumes:
    postgres_data:
    redis_data:

networks:
    app-network:
        driver: bridge
