<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VestraPay - Test Checkout</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 40px; width: 420px; }
        h1 { font-size: 24px; margin-bottom: 4px; color: #1a1a2e; }
        .subtitle { color: #6b7280; margin-bottom: 24px; font-size: 14px; }
        .field { margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; }
        input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .row { display: flex; gap: 12px; }
        .row .field { flex: 1; }
        button { width: 100%; padding: 14px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        button:hover { background: #4f46e5; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        #status { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 13px; display: none; }
        .status-info { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .status-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .status-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        #threeds-container { margin-top: 16px; border-radius: 8px; overflow: hidden; }
        #threeds-container iframe { border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>VestraPay Checkout</h1>
        <p class="subtitle">Test card payment with MPGS 3DS</p>

        <div class="field">
            <label>Amount (NGN)</label>
            <input type="number" id="amount" value="1000" min="1">
        </div>

        <div class="field">
            <label>Email</label>
            <input type="email" id="email" value="test@example.com">
        </div>

        <div class="field">
            <label>Card Number</label>
            <input type="text" id="cardNumber" value="5123450000000008" maxlength="19">
        </div>

        <div class="row">
            <div class="field">
                <label>Expiry Month</label>
                <input type="text" id="expiryMonth" value="01" maxlength="2">
            </div>
            <div class="field">
                <label>Expiry Year</label>
                <input type="text" id="expiryYear" value="39" maxlength="2">
            </div>
            <div class="field">
                <label>CVV</label>
                <input type="text" id="cvv" value="100" maxlength="4">
            </div>
        </div>

        <button id="payBtn" onclick="pay()">Pay Now</button>

        <div id="status"></div>
        <div id="threeds-container"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api/v1/public/payment';
        const API_KEY = 'local_fyFGb7ywyM37TqDY8nuhAmGW5:qbp7LmCxYUTHFwKvHnxGW1aTyjSNU6ytN21etK89MaP2Dj2KZP';

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status-' + type;
            el.style.display = 'block';
        }

        async function pay() {
            const btn = document.getElementById('payBtn');
            btn.disabled = true;
            btn.textContent = 'Processing...';
            showStatus('Sending card to MPGS...', 'info');

            try {
                const res = await fetch(API_BASE + '/charge/card', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY,
                    },
                    body: JSON.stringify({
                        amount: parseInt(document.getElementById('amount').value) * 100,
                        currency: 'NGN',
                        email: document.getElementById('email').value,
                        card: {
                            number: document.getElementById('cardNumber').value.replace(/\s/g, ''),
                            cvv: document.getElementById('cvv').value,
                            expiryMonth: document.getElementById('expiryMonth').value,
                            expiryYear: document.getElementById('expiryYear').value,
                        },
                    }),
                });

                const json = await res.json();
                const data = json.data;

                if (data.status === 'success') {
                    showStatus('Payment successful! Ref: ' + data.reference, 'success');
                    btn.textContent = 'Paid!';
                    return;
                }

                if (data.status === '3ds_required') {
                    showStatus('3DS authentication required. Complete the challenge below...', 'info');
                    const container = document.getElementById('threeds-container');
                    container.innerHTML = data.threeDsHtml;

                    // Execute any scripts in the injected HTML
                    const scripts = container.querySelectorAll('script');
                    scripts.forEach(script => {
                        const newScript = document.createElement('script');
                        newScript.textContent = script.textContent;
                        script.parentNode.replaceChild(newScript, script);
                    });

                    btn.textContent = 'Waiting for 3DS...';
                    return;
                }

                if (data.status === 'failed') {
                    showStatus('Payment failed: ' + (data.gatewayResponse || 'Declined'), 'error');
                    btn.disabled = false;
                    btn.textContent = 'Try Again';
                    return;
                }

                showStatus('Unexpected status: ' + JSON.stringify(data), 'error');
            } catch (err) {
                showStatus('Error: ' + err.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Try Again';
            }
        }
    </script>
</body>
</html>
