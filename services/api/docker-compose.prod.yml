name: vestrapay

services:
    migrator:
        image: ${IMAGE_PREFIX:-vestrapay}-builder:latest
        container_name: vestrapay-migrator
        command: ["pnpm", "exec", "prisma", "db", "push", "--accept-data-loss"]
        env_file: .env
        networks:
            - app-network
        depends_on:
            postgres:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 256M

    seeder:
        image: ${IMAGE_PREFIX:-vestrapay}-builder:latest
        container_name: vestrapay-seeder
        command: >
            sh -c "node dist/migration.js apiKey --type seed &&
                   node dist/migration.js featureFlag --type seed &&
                   node dist/migration.js role --type seed &&
                   node dist/migration.js user --type seed &&
                   node dist/migration.js merchant --type seed &&
                   node dist/migration.js template-email --type seed"
        env_file: .env
        networks:
            - app-network
        depends_on:
            migrator:
                condition: service_completed_successfully
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 256M

    api:
        image: ${IMAGE_PREFIX:-vestrapay}-api:latest
        container_name: vestrapay-api
        ports:
            - "3000:3000"
        env_file: .env
        restart: unless-stopped
        networks:
            - app-network
        depends_on:
            seeder:
                condition: service_completed_successfully
            redis:
                condition: service_healthy
            jwks-server:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--no-verbose",
                    "--tries=1",
                    "--spider",
                    "http://127.0.0.1:3000/api/public/health/liveness",
                ]
            interval: 20s
            timeout: 10s
            retries: 3
            start_period: 60s
        deploy:
            resources:
                limits:
                    memory: 256M

    jwks-server:
        image: nginx:alpine
        container_name: vestrapay-jwks
        restart: unless-stopped
        volumes:
            - ./keys/access-jwks.json:/usr/share/nginx/html/.well-known/access-jwks.json
            - ./keys/refresh-jwks.json:/usr/share/nginx/html/.well-known/refresh-jwks.json
            - ./jwks.conf:/etc/nginx/conf.d/default.conf
        networks:
            - app-network
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--no-verbose",
                    "--tries=1",
                    "--spider",
                    "http://127.0.0.1:80/.well-known/access-jwks.json",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        deploy:
            resources:
                limits:
                    memory: 64M

    redis:
        image: redis:alpine
        container_name: vestrapay-redis
        restart: unless-stopped
        volumes:
            - redis_data:/data
        networks:
            - app-network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 30s
            retries: 5
        deploy:
            resources:
                limits:
                    memory: 64M

    postgres:
        image: postgres:16-alpine
        container_name: vestrapay-postgres
        restart: unless-stopped
        env_file: .env
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-vestrapay}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB:-vestrapay}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - app-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vestrapay}"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        deploy:
            resources:
                limits:
                    memory: 128M

volumes:
    # WARNING: postgres_data contains the production database.
    # NEVER use 'docker compose down -v' in production.
    postgres_data:
    redis_data:

networks:
    app-network:
        driver: bridge
