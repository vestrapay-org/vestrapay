name: Deploy API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'services/api/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('services/api/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        run: |
          docker buildx build \
            --file services/api/ci/dockerfile \
            --tag vestrapay-api:latest \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            services/api

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Save & compress Docker image
        run: docker save vestrapay-api:latest | gzip > vestrapay-api.tar.gz

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: vestrapay-api.tar.gz,services/api/docker-compose.prod.yml,services/api/ci/jwks-server/jwks.conf
          target: /tmp/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "→ Loading Docker image..."
            docker load < /tmp/vestrapay-api.tar.gz
            rm /tmp/vestrapay-api.tar.gz

            echo "→ Setting up files..."
            mkdir -p /opt/vestrapay/keys
            cp /tmp/services/api/docker-compose.prod.yml /opt/vestrapay/docker-compose.yml
            cp /tmp/services/api/ci/jwks-server/jwks.conf /opt/vestrapay/jwks.conf
            rm -rf /tmp/services

            echo "→ Checking .env exists..."
            if [ ! -f /opt/vestrapay/.env ]; then
              echo "ERROR: /opt/vestrapay/.env not found. Create it on the VPS first."
              exit 1
            fi

            echo "→ Starting infra services..."
            cd /opt/vestrapay
            docker compose up -d redis postgres jwks-server

            echo "→ Waiting for database..."
            sleep 5

            echo "→ Running database migrations..."
            docker run --rm \
              --network vestrapay_app-network \
              --env-file /opt/vestrapay/.env \
              vestrapay-api:latest \
              npx prisma migrate deploy

            echo "→ Starting API..."
            docker compose up -d

            echo "→ Cleaning up old images..."
            docker image prune -f

            echo "→ Done."
