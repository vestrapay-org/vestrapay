name: Deploy API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'services/api/**'
      - '.github/workflows/deploy-api.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/vestrapay

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Single build produces both builder and api from shared cache
      - name: Build and push builder image (migrator + seeder)
        uses: docker/build-push-action@v6
        with:
          context: services/api
          file: services/api/ci/dockerfile
          target: builder
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-builder:latest,${{ env.IMAGE_PREFIX }}-builder:${{ github.sha }}
          cache-from: type=gha,scope=builder
          cache-to: type=gha,scope=builder,mode=max

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          file: services/api/ci/dockerfile
          target: main
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-api:latest,${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha,scope=builder
          cache-to: type=gha,scope=api,mode=max

      - name: Copy config files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: services/api/docker-compose.prod.yml,services/api/ci/jwks-server/jwks.conf
          target: /tmp/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_PREFIX,GHCR_PAT,GHCR_USER
          script: |
            set -e

            export IMAGE_PREFIX="${IMAGE_PREFIX}"

            echo "-> Stopping running services (preserving volumes)..."
            cd /opt/vestrapay 2>/dev/null && docker compose down 2>/dev/null || true

            echo "-> Setting up files..."
            mkdir -p /opt/vestrapay/keys
            cp /tmp/services/api/docker-compose.prod.yml /opt/vestrapay/docker-compose.yml
            cp /tmp/services/api/ci/jwks-server/jwks.conf /opt/vestrapay/jwks.conf
            rm -rf /tmp/services

            echo "-> Logging into GHCR..."
            echo "${GHCR_PAT}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            echo "-> Pulling latest images..."
            cd /opt/vestrapay
            docker compose pull

            echo "-> Cleaning up dangling images..."
            docker image prune -f

            echo "-> Checking .env exists..."
            if [ ! -f /opt/vestrapay/.env ]; then
              echo "ERROR: /opt/vestrapay/.env not found. Create it on the VPS first."
              exit 1
            fi

            echo "-> Verifying database volume..."
            docker volume inspect vestrapay_postgres_data > /dev/null 2>&1 && \
              echo "  postgres_data volume exists and will be preserved" || \
              echo "  postgres_data volume does not exist (first deploy)"

            echo "-> Starting services (migrator -> seeder -> API)..."
            docker compose up -d --force-recreate

            echo "-> Waiting for API to be healthy..."
            timeout 120 sh -c 'until docker compose ps api | grep -q "healthy"; do sleep 5; done' || echo "Warning: API health check timed out"

            echo "-> Cleaning up init containers..."
            docker compose rm -f migrator seeder 2>/dev/null || true

            echo "-> Done."
