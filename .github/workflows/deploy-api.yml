name: Deploy API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'services/api/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-api.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/vestrapay

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push builder image (migrator + seeder)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/ci/dockerfile
          target: builder
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-builder:latest,${{ env.IMAGE_PREFIX }}-builder:${{ github.sha }}
          cache-from: type=gha,scope=api-build
          cache-to: type=gha,scope=api-build,mode=max

      - name: Build and push API runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/ci/dockerfile
          target: runtime
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-api:latest,${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha,scope=api-build
          cache-to: type=gha,scope=api-runtime,mode=max

      - name: Prepare config files
        id: configs
        run: |
          echo "COMPOSE_B64=$(base64 -w0 services/api/docker-compose.prod.yml)" >> "$GITHUB_OUTPUT"
          echo "JWKS_B64=$(base64 -w0 services/api/ci/jwks-server/jwks.conf)" >> "$GITHUB_OUTPUT"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.actor }}
          COMPOSE_B64: ${{ steps.configs.outputs.COMPOSE_B64 }}
          JWKS_B64: ${{ steps.configs.outputs.JWKS_B64 }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_PREFIX,GHCR_PAT,GHCR_USER,COMPOSE_B64,JWKS_B64
          script: |
            set -e

            export IMAGE_PREFIX="${IMAGE_PREFIX}"

            echo "-> Writing config files..."
            mkdir -p /opt/vestrapay/keys
            echo "${COMPOSE_B64}" | base64 -d > /opt/vestrapay/docker-compose.yml
            echo "${JWKS_B64}" | base64 -d > /opt/vestrapay/jwks.conf

            echo "-> Logging into GHCR..."
            echo "${GHCR_PAT}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            echo "-> Pulling latest images..."
            cd /opt/vestrapay
            docker compose pull

            echo "-> Checking .env exists..."
            if [ ! -f /opt/vestrapay/.env ]; then
              echo "ERROR: /opt/vestrapay/.env not found. Create it on the VPS first."
              exit 1
            fi

            echo "-> Verifying database volume..."
            docker volume inspect vestrapay_postgres_data > /dev/null 2>&1 && \
              echo "  postgres_data volume exists and will be preserved" || \
              echo "  postgres_data volume does not exist (first deploy)"

            echo "-> Running migrations..."
            if ! docker compose run --rm migrator; then
              echo "Migration failed! Aborting deployment."
              exit 1
            fi
            if ! docker compose run --rm seeder; then
              echo "Seeder failed! Aborting deployment."
              exit 1
            fi

            echo "-> Rolling restart of API..."
            docker compose up -d --no-deps --wait api

            echo "-> Cleaning up..."
            docker compose rm -f migrator seeder 2>/dev/null || true
            docker image prune -f

            echo "-> Done."
