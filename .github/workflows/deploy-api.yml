name: Deploy API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'services/api/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          file: services/api/ci/dockerfile
          target: main
          tags: vestrapay-api:latest
          load: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build migrator image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          file: services/api/ci/dockerfile
          target: migrator
          tags: vestrapay-migrator:latest
          load: true
          cache-from: type=gha,scope=migrator
          cache-to: type=gha,scope=migrator,mode=max

      - name: Save & compress Docker images
        run: |
          docker save vestrapay-api:latest vestrapay-migrator:latest | gzip > vestrapay-images.tar.gz

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: vestrapay-images.tar.gz,services/api/docker-compose.prod.yml,services/api/ci/jwks-server/jwks.conf
          target: /tmp/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "→ Stopping running services..."
            cd /opt/vestrapay 2>/dev/null && docker compose down 2>/dev/null || true

            echo "→ Cleaning up old images..."
            docker image prune -af

            echo "→ Setting up files..."
            mkdir -p /opt/vestrapay/keys
            cp /tmp/services/api/docker-compose.prod.yml /opt/vestrapay/docker-compose.yml
            cp /tmp/services/api/ci/jwks-server/jwks.conf /opt/vestrapay/jwks.conf
            rm -rf /tmp/services

            echo "→ Loading Docker images..."
            docker load < /tmp/vestrapay-images.tar.gz
            rm -f /tmp/vestrapay-images.tar.gz

            echo "→ Checking .env exists..."
            if [ ! -f /opt/vestrapay/.env ]; then
              echo "ERROR: /opt/vestrapay/.env not found. Create it on the VPS first."
              exit 1
            fi

            echo "→ Starting services (migrator runs automatically before API)..."
            cd /opt/vestrapay
            docker compose up -d

            echo "→ Waiting for API to be healthy..."
            timeout 120 sh -c 'until docker compose ps api | grep -q "healthy"; do sleep 5; done' || echo "Warning: API health check timed out"

            echo "→ Cleaning up migrator container..."
            docker compose rm -f migrator 2>/dev/null || true

            echo "→ Done."
